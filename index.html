<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valencia Collaborative App</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#0f0f13] text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-[#1e1e24] border-b border-[#3a3a42] px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide text-blue-400">Vite + Tailwind Core</h1>
        <span class="bg-green-500/10 text-green-400 text-xs px-2.5 py-1 rounded border border-green-500/20 font-mono">Status: Active</span>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-md bg-[#1e1e24] border border-[#3a3a42] p-8 rounded-xl shadow-2xl">
            <h2 class="text-2xl font-bold mb-3" id="welcome-title">Loading Project State...</h2>
            <p class="text-[#a5a5b5] text-sm mb-6" id="welcome-desc">Connecting to app utilities...</p>
            <button id="action-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer">
                Trigger Event Loop
            </button>
        </div>
    </main>

    <footer class="bg-[#1a1a20] text-center py-3 border-t border-[#2d2d38]">
        <p class="text-xs text-[#5a5a6a] font-mono">Build Pipeline: 6 Files Successfully Compiled</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
